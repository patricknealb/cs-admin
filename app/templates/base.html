<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
        nav { background: #2c3e50; padding: 1rem 2rem; display: flex; gap: 2rem; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 1rem; }
        nav a:hover { color: #3498db; }
        nav .title { color: white; font-weight: bold; font-size: 1.2rem; margin-right: auto; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        h2 { margin-bottom: 1.5rem; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #2c3e50; color: white; padding: 0.75rem 1rem; text-align: left; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #eee; vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }
        .btn { padding: 0.4rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn:hover { opacity: 0.85; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .card h3 { margin-bottom: 1rem; color: #2c3e50; }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 150px; }
        .form-group label { font-size: 0.85rem; font-weight: bold; color: #555; }
        input, select, textarea { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; width: 100%; }
        textarea { resize: vertical; min-height: 80px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 8px; width: 100%; max-width: 550px; }
        .modal-content h3 { margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; }
    </style>
</head>
<body>
    <nav>
        <span class="title">Admin Panel</span>
        <a href="/messages">Messages</a>
        <a href="/categories">Categories</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
